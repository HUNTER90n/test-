<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Titel 1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background-color:#1a1025;color:#f0d9ff;font-family:'Space Grotesk', sans-serif;min-height:100vh;padding:2rem 1rem;background-image:url('https://i.postimg.cc/B6y4nH4Q/Gemini-Generated-Image-9vptyf9vptyf9vpt.png');background-size:cover;background-position:center;background-attachment:fixed;}
body::before{content:'';position:fixed;inset:0;background:#1a1025cc;z-index:-1;pointer-events:none}
.sound-toggle{position:fixed;bottom:1.5rem;left:1.5rem;width:44px;height:44px;border-radius:50%;border:none;background:#ff6bcb;color:#1a1025;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px #ff6bcb40;z-index:95;transition:transform .3s}
.sound-toggle:hover{transform:scale(1.1)}
body.locked .container{filter:blur(12px);pointer-events:none;user-select:none}
.container{max-width:900px;margin:0 auto;transition:filter .4s}
header{text-align:center;margin-bottom:2rem;padding:2rem 0}
@keyframes fadeInUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px #ff6bcb30}50%{text-shadow:0 0 40px #ff6bcb50,0 0 80px #ff6bcb20}}
@keyframes slideIn{0%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
@keyframes cardPop{0%{opacity:0;transform:scale(0.8) translateY(20px)}60%{transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeInPage{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 5px #ff6bcb20}50%{box-shadow:0 0 20px #ff6bcb40}}
@keyframes lockBounce{0%{transform:scale(1)}25%{transform:scale(1.2)}50%{transform:scale(0.95)}100%{transform:scale(1)}}
h1{font-size:2.5rem;font-weight:700;margin-bottom:.75rem;background:linear-gradient(135deg,#ff6bcb,#f0d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeInUp .8s ease-out,titleGlow 3s ease-in-out infinite}
.subtitle{font-size:1.1rem;opacity:0;max-width:500px;margin:0 auto;animation:fadeInUp .8s ease-out .2s forwards}
.page-tabs{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap;opacity:0;animation:fadeInUp .6s ease-out .3s forwards}
.page-tab{padding:.5rem 1.25rem;border-radius:8px;border:1px solid #ff6bcb30;background:transparent;color:#f0d9ff;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.page-tab:hover{background:#ff6bcb15;transform:translateY(-2px)}
.page-tab.active{background:#ff6bcb;color:#1a1025;animation:pulseGlow 2s ease-in-out infinite}
.page-content{display:none}
.page-content.active{display:block;animation:fadeInPage .4s ease-out}
.category{margin-bottom:2.5rem;opacity:0;animation:slideIn .6s ease-out forwards}
.category:nth-child(1){animation-delay:.1s}.category:nth-child(2){animation-delay:.2s}.category:nth-child(3){animation-delay:.3s}.category:nth-child(4){animation-delay:.4s}.category:nth-child(5){animation-delay:.5s}
.category h2{font-size:1.25rem;font-weight:600;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #ff6bcb30;display:inline-block;position:relative}
.category h2::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:#ff6bcb;transition:width .6s ease-out}
.category:hover h2::after{width:100%}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem}
.tool-card{display:flex;flex-direction:column;align-items:center;gap:.75rem;padding:1.25rem 1rem;background:#2d1b4e;border-radius:12px;text-decoration:none;color:#f0d9ff;transition:all .3s cubic-bezier(.4,0,.2,1);border:1px solid #ff6bcb15;opacity:0;animation:cardPop .5s ease-out forwards}
.tool-card:nth-child(1){animation-delay:.15s}.tool-card:nth-child(2){animation-delay:.25s}.tool-card:nth-child(3){animation-delay:.35s}.tool-card:nth-child(4){animation-delay:.45s}.tool-card:nth-child(5){animation-delay:.55s}.tool-card:nth-child(6){animation-delay:.65s}.tool-card:nth-child(7){animation-delay:.75s}.tool-card:nth-child(8){animation-delay:.85s}
.tool-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 30px #ff6bcb25;border-color:#ff6bcb50}
.tool-card:active{transform:translateY(-2px) scale(0.98)}
.tool-card img,.tool-card .tool-icon{width:48px;height:48px;object-fit:contain;border-radius:8px;transition:transform .3s;color:#ff6bcb}
.tool-card:hover img,.tool-card:hover .tool-icon{transform:rotate(-5deg) scale(1.1)}
.tool-card span{font-size:.85rem;font-weight:600;text-align:center;transition:color .2s}
.tool-card:hover span{color:#ff6bcb}
.channel-btn{display:flex;align-items:center;gap:.5rem;background:#25d366;color:#fff;padding:.75rem 1.25rem;border-radius:50px;text-decoration:none;font-weight:600;font-size:.9rem;box-shadow:0 4px 15px rgba(37,211,102,.4);transition:all .3s;z-index:90;opacity:0;animation:cardPop .5s ease-out .8s forwards}
.channel-btn:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,.5)}
.channel-btn.fixed-channel{position:fixed;bottom:1.5rem;right:1.5rem}
.lock-box .channel-btn{width:100%;justify-content:center;margin-bottom:.75rem;border-radius:8px;background:#ff6bcb;box-shadow:0 4px 15px #ff6bcb40;color:#1a1025;font-family:inherit;font-size:.95rem;font-weight:700;animation:none;opacity:1}
.lock-box .channel-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #ff6bcb50}
.lock-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#1a1025ee;backdrop-filter:blur(20px);transition:opacity .6s cubic-bezier(.4,0,.2,1),visibility .6s}
.lock-overlay.unlocked{opacity:0;visibility:hidden;pointer-events:none}
.lock-box{text-align:center;padding:2.5rem;border-radius:16px;background:#2d1b4e;border:1px solid #ff6bcb30;max-width:360px;width:90%;opacity:0;animation:cardPop .6s ease-out .2s forwards}
.lock-icon{font-size:3rem;margin-bottom:1rem;animation:lockBounce 1s ease-out .5s}
.lock-box h2{font-size:1.25rem;margin-bottom:.5rem}
.lock-box p{font-size:.85rem;opacity:.7;margin-bottom:1.25rem}
.lock-input{width:100%;padding:.75rem 1rem;border-radius:8px;border:1px solid #ff6bcb40;background:#1a1025;color:#f0d9ff;font-family:inherit;font-size:1rem;text-align:center;letter-spacing:.15em;outline:none;margin-bottom:.75rem;transition:all .3s}
.lock-input:focus{border-color:#ff6bcb;box-shadow:0 0 0 3px #ff6bcb20;transform:scale(1.02)}
.lock-btn{width:100%;padding:.75rem;border-radius:8px;border:none;background:#ff6bcb;color:#1a1025;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s}
.lock-btn:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 15px #ff6bcb30}
.lock-error{color:#ef4444;font-size:.8rem;margin-top:.75rem;min-height:1.2em;animation:fadeInUp .3s ease-out}
@media(max-width:600px){h1{font-size:1.75rem}.tools-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}}
</style>
</head>
<body>

    <div id="lock-overlay" class="lock-overlay">
      <div class="lock-box">
        <div class="lock-icon">🔒</div>
        <h2>This toolkit is protected</h2>
        <p>Enter the passcode to continue</p>
        <input type="password" id="passcode-input" class="lock-input" placeholder="Passcode..." autofocus />
        <a href="https://wa.me/923005381443" target="_blank" rel="noopener noreferrer" class="channel-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.638l4.685-1.258A11.953 11.953 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.234 0-4.308-.639-6.073-1.744l-.424-.268-3.26.875.716-3.392-.264-.42A9.946 9.946 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
        Join Channel
      </a>
        <button onclick="checkUnlock()" class="lock-btn">Unlock</button>
        <p id="lock-error" class="lock-error"></p>
      </div>
    </div>
<div class="container">
  <header>
    <h1>Titel 1</h1>

    <script>
    (function(){
      var code = "Ahmad";
      var overlay = document.getElementById('lock-overlay');
      var input = document.getElementById('passcode-input');
      window.checkUnlock = function() {
        if (input.value === code) {
          overlay.classList.add('unlocked');
          document.body.classList.remove('locked');
        } else {
          document.getElementById('lock-error').textContent = 'Wrong passcode. Try again.';
          input.value = '';
          input.focus();
        }
      };
      input.addEventListener('keydown', function(e){ if (e.key === 'Enter') window.checkUnlock(); });
      document.body.classList.add('locked');
    })();
    </script>

<script>lucide.createIcons();</script>
</body>
